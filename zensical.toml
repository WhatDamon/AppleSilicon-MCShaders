# Project information
[project]
site_name = "Apple Silicon MC 光影指南"
site_description = "致力于成为 Apple Silicon 用户提供一站式光影支持查阅服务"
site_url = "https://whatdamon.github.io/AppleSilicon-MCShaders"
repo_url = "https://github.com/WhatDamon/AppleSilicon-MCShaders"
copyright = "本书籍使用 CC0 许可证供所有人免费查阅, 其中部分资源原作者版权所有<br />由 WhatDamon 管理"

# Theme configuration
[project.theme]
name = "material"
language = "zh"
logo = "imgs/icon.png"
favicon = "imgs/icon.png"
features = [
    "navigation.instant",
    "navigation.tracking",
    "navigation.sections",
    "navigation.expand",
    "navigation.top",
    "search.suggest",
    "search.highlight",
    "header.autohide"
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

# Color palette - light and dark mode toggle
[[project.theme.palette]]
scheme = "default"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"


[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji" 
emoji_generator = "zensical.extensions.emoji.to_svg"

# Navigation - TOML array of tables
[[project.nav]]
    "主页" = "index.md"

[[project.nav]]
    "贡献" = "contribute.md"

[[project.nav]]
    "M4 系列" = [
        { "Mac16,1" = "Mac16,1.md" }
    ]

# Extra settings
[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/WhatDamon"
name = "GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/bilibili"
link = "https://space.bilibili.com/351191993"
name = "哔哩哔哩"

# Extra JavaScript
extra_javascript = ["js/detect-os.js"]
